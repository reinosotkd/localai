<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina AI - Modern Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-glass: rgba(255, 255, 255, 0.05);
            --bg-glass-heavy: rgba(255, 255, 255, 0.1);
            --bg-primary: #0a0a0c;
            --bg-secondary: rgba(255, 255, 255, 0.08);
            --bg-sidebar: rgba(0, 0, 0, 0.4);
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --border: rgba(255, 255, 255, 0.1);
            --error: #ff453a;
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: #000;
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            position: relative;
        }

        /* Animated Background Blobs */
        .bg-blob {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 113, 227, 0.15) 0%, transparent 70%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            animation: float 20s infinite alternate;
        }
        .blob-1 { top: -10%; left: -10%; }
        .blob-2 { bottom: -10%; right: -10%; background: radial-gradient(circle, rgba(255, 69, 58, 0.1) 0%, transparent 70%); }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 50px) scale(1.1); }
        }

        .container { display: flex; height: 100vh; position: relative; z-index: 1; }

        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 15px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 100;
        }

        .sidebar.hidden {
            transform: translateX(-100%);
            margin-right: -280px;
        }

        .sidebar-header {
            padding-bottom: 20px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 12px 15px;
            margin: 6px 0;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            transition: all 0.3s;
            background: transparent;
        }

        .chat-item:hover { background: var(--bg-glass); color: var(--text-primary); }
        .chat-item.active { background: var(--bg-glass-heavy); color: var(--text-primary); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        .chat-item-content {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chat-symbol {
            font-family: monospace;
            font-weight: bold;
            opacity: 0.7;
            width: 20px;
        }

        .rename-btn {
            opacity: 0;
            padding: 4px;
            border-radius: 4px;
            transition: opacity 0.2s;
            color: var(--text-secondary);
        }

        .chat-item:hover .rename-btn { opacity: 1; }
        .rename-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.1); }

        .sidebar-footer {
            padding: 15px;
            border-top: 1px solid var(--border);
        }

        .new-chat-btn {
            background: var(--bg-glass);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-bottom: 20px;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        .new-chat-btn:hover {
            background: var(--bg-glass-heavy);
            transform: scale(1.02);
        }

        .google-login-section {
            margin-top: auto;
            padding: 10px;
            border-top: 1px solid var(--border);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: transparent;
            overflow: hidden;
        }

        .header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 10, 12, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        .toggle-sidebar-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-sidebar-btn:hover {
            background: var(--bg-glass);
            color: var(--text-primary);
        }

        .gpt-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
            background: var(--bg-glass);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
            outline: none;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
        }

        .gpt-label option {
            background: #1a1a1c;
            color: var(--text-primary);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0 180px 0;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            margin-top: 15vh;
            color: var(--text-secondary);
            padding: 0 20px;
        }

        .welcome h1 {
            color: var(--text-primary);
            font-size: 3rem;
            margin-bottom: 24px;
            font-weight: 800;
            letter-spacing: -0.04em;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .message {
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 850px;
            margin: 5px auto;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { align-items: flex-end; }
        .message.assistant { align-items: flex-start; }

        .bubble {
            padding: 14px 18px;
            border-radius: 22px;
            max-width: 85%;
            line-height: 1.6;
            position: relative;
            box-shadow: var(--shadow);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
        }

        .message.user .bubble {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .message.assistant .bubble {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-bottom-left-radius: 6px;
            display: flex;
            gap: 12px;
        }

        .avatar {
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .avatar svg { width: 100%; height: 100%; fill: var(--accent); }

        .message-content { flex: 1; white-space: pre-wrap; word-break: break-word; }
        .message-content p { margin-bottom: 10px; }
        .message-content code {
            background: rgba(0,0,0,0.2); padding: 2px 6px;
            border-radius: 3px; font-family: 'Courier New', monospace;
        }
        .message-content pre {
            background: rgba(0,0,0,0.3); padding: 15px;
            border-radius: 6px; overflow-x: auto; margin: 10px 0;
        }

        .input-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 20px 50px;
            pointer-events: none;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-wrapper {
            width: 100%;
            max-width: 800px;
            position: relative;
            background: rgba(40, 40, 45, 0.4);
            backdrop-filter: blur(50px) saturate(200%);
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 32px;
            box-shadow: 0 25px 60px -15px rgba(0, 0, 0, 0.7);
            display: flex; align-items: center; padding: 10px 10px 10px 20px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: auto;
        }

        .input-wrapper:focus-within {
            background: rgba(50, 50, 55, 0.6);
            border-color: rgba(255, 255, 255, 0.25);
            transform: scale(1.02) translateY(-5px);
            box-shadow: 0 30px 70px -10px rgba(0, 0, 0, 0.8);
        }

        .plus-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: var(--text-primary);
            width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; transition: all 0.3s;
            flex-shrink: 0;
        }
        .plus-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }

        .message-input {
            flex: 1; background: transparent; border: none;
            color: var(--text-primary); padding: 12px 15px;
            font-size: 17px; resize: none; outline: none;
            min-height: 26px; max-height: 250px; font-family: inherit;
            line-height: 1.4;
        }

        .message-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .send-btn {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border: none; width: 44px; height: 44px;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-left: 8px;
            flex-shrink: 0;
        }

        .send-btn.active { background: var(--accent); transform: scale(1.05); }
        .send-btn.active:hover { background: var(--accent-hover); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .typing-indicator { display: none; padding: 20px; background: var(--bg-secondary); }
        .typing-indicator.active { display: flex; }

        .dots { display: flex; gap: 4px; align-items: center; }

        /* Suggestion Bubbles */
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            align-items: center;
            margin: 40px auto 0;
            max-width: 800px;
            width: 100%;
            padding: 0 20px;
            pointer-events: auto;
        }

        .suggestion-bubble {
            background: rgba(200, 200, 200, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 24px;
            border-radius: 24px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #e5e5ea;
            text-align: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .suggestion-bubble:hover {
            background: rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
            transform: translateY(-4px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Loading Animation */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            padding: 20px;
            background: var(--bg-glass);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Canvas / Code Display */
        .canvas-container {
            width: 100%;
            background: #1e1e1e;
            border-radius: 12px;
            margin-top: 15px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            z-index: 2000;
            position: relative;
        }

        .canvas-header {
            background: #2d2d2d;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #aaa;
        }

        .copy-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }

        .canvas-content {
            padding: 15px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            color: #d4d4d4;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* Incremental Text Animation */
        .typing-text {
            display: inline;
        }

        .fade-bottom {
            position: relative;
        }

        .fade-bottom::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 20px;
            background: linear-gradient(to top, var(--bg-primary), transparent);
            pointer-events: none;
            opacity: 0.5;
        }

        /* Specialized Box for Detector */
        .detector-box {
            background: rgba(255, 69, 58, 0.15);
            border: 1px solid var(--error);
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: inline-block;
            font-weight: 600;
            color: var(--error);
            pointer-events: auto;
        }

        /* Tools Menu */
        .tools-menu {
            position: absolute;
            bottom: 110px;
            left: 30px;
            background: rgba(30, 30, 35, 0.98);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 18px;
            width: 280px;
            display: none;
            flex-direction: column;
            gap: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            z-index: 110000;
            pointer-events: auto;
            transform-origin: bottom left;
            animation: menuPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes menuPop {
            from { transform: scale(0.8) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .tool-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            padding: 14px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            text-align: left;
        }

        .tool-btn:hover { background: var(--bg-glass); }
        .tool-btn small { color: var(--text-secondary); font-size: 12px; }

        /* AI Detector Result Styling */
        .ai-highlight {
            color: #ef4444;
            text-decoration: underline;
            font-weight: bold;
        }
        .dot {
            width: 8px; height: 8px; background: var(--text-secondary);
            border-radius: 50%; animation: bounce 1.4s infinite ease-in-out;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .error-box {
            background: var(--error); color: white;
            padding: 12px; border-radius: 6px;
            margin: 10px auto; max-width: 800px;
            font-size: 14px; display: none;
            white-space: pre-wrap;
        }

        .api-status {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; margin-right: 5px;
            background: var(--error);
        }
        .api-status.ready { background: var(--accent); }

        /* Full Screen Preview Overlay */
        .preview-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 200000;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }
        .preview-header {
            padding: 10px 25px;
            background: #1a1a1c;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .preview-browser-controls {
            display: flex;
            gap: 8px;
        }
        .browser-dot {
            width: 12px; height: 12px; border-radius: 50%;
        }
        .dot-red { background: #ff5f57; }
        .dot-yellow { background: #febc2e; }
        .dot-green { background: #28c840; }

        .preview-address-bar {
            flex: 1;
            background: #2c2c2e;
            padding: 6px 15px;
            border-radius: 8px;
            color: #8e8e93;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .preview-close-btn {
            background: #ff453a;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .preview-close-btn:hover { opacity: 0.8; }

        .preview-iframe {
            flex: 1;
            border: none;
            background: white;
        }

        /* Modals & Onboarding */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 300000;
            display: none;
            align-items: center; justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: #1c1c1e;
            width: 100%;
            max-width: 500px;
            border-radius: 24px;
            padding: 40px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            animation: menuPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .modal-title {
            font-size: 24px; font-weight: 700; margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, #aaa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .modal-subtitle { color: var(--text-secondary); margin-bottom: 30px; font-size: 14px; }

        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px; text-transform: uppercase; }
        .form-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }
        .form-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }
        .form-textarea { resize: none; min-height: 80px; font-family: inherit; }

        .modal-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .modal-btn:hover { background: var(--accent-hover); transform: scale(1.02); }

        .settings-btn {
            margin-top: 10px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 10px;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 13px; transition: all 0.2s;
        }
        .settings-btn:hover { background: var(--bg-glass); color: var(--text-primary); }

        /* Intro Menus */
        .intro-menu {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 600px;
            background: rgba(28, 28, 30, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            z-index: 5000;
            animation: fadeIn 0.5s ease;
        }
        .intro-img-placeholder {
            width: 100%; height: 200px;
            background: rgba(255,255,255,0.03);
            border: 2px dashed var(--border);
            border-radius: 20px;
            margin-bottom: 25px;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary); font-size: 14px;
        }
        .intro-img-placeholder img { max-width: 100%; max-height: 100%; border-radius: 18px; object-fit: cover; }
        .intro-title { font-size: 28px; font-weight: 800; margin-bottom: 15px; }
        .intro-desc { color: var(--text-secondary); margin-bottom: 30px; line-height: 1.6; }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed; top: 0; left: 0; height: 100%; width: 280px;
                z-index: 100000;
            }
            .sidebar.hidden { transform: translateX(-100%); margin-right: 0; }
        }
    </style>
</head>
<body>
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <!-- Onboarding Modal -->
    <div id="onboardingModal" class="modal-overlay">
        <div class="modal-content">
            <h2 class="modal-title">Bienvenido a Lumina</h2>
            <p class="modal-subtitle">Personaliza tu experiencia con tu nueva asistente de IA.</p>
            <div class="form-group">
                <label class="form-label">Nombre y Apellidos</label>

    <script>
        // ============================================
        // CONFIGURACIÓN - PEGA TU API KEY AQUÍ
        // ============================================
        const GROQ_API_KEY = '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';
        
        // ============================================
        // ESTADO GLOBAL
        // ============================================
        const BASE_URL = "https://api.groq.com/openai/v1";
        let userProfile = JSON.parse(localStorage.getItem('lumina_user')) || null;
        let currentChatId = Date.now().toString();
        let chats = JSON.parse(localStorage.getItem('lumina_chats')) || {};
        let messages = [];
        let isTyping = false;
        let currentUser = null;
        let isHumanizing = false;
        let isWebCreating = false;

        // ============================================
        // GOOGLE LOGIN
        // ============================================
        function handleCredentialResponse(response) {
            const responsePayload = parseJwt(response.credential);
            currentUser = {
                id: responsePayload.sub,
                name: responsePayload.name,
                email: responsePayload.email,
                picture: responsePayload.picture
            };
            console.log("Logged in as: " + currentUser.name);
            alert("Bienvenido, " + currentUser.name);
        }

        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        // ============================================
        // HISTORIAL DE CHATS
        // ============================================
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            sidebar.classList.toggle('hidden');

            // On mobile, also toggle an overlay to close it when clicking outside
            if (window.innerWidth <= 768) {
                let overlay = document.getElementById('sidebarOverlay');
                if (!overlay) {
                    overlay = document.createElement('div');
                    overlay.id = 'sidebarOverlay';
                    overlay.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:90000; display:none;';
                    overlay.onclick = toggleSidebar;
                    document.body.appendChild(overlay);
                }
                overlay.style.display = sidebar.classList.contains('hidden') ? 'none' : 'block';
            }
        }

        function useSuggestion(text) {
            document.getElementById('messageInput').value = text;
            autoResize(document.getElementById('messageInput'));
            sendMessage();
        }

        function saveChat() {
            if (messages.length === 0) return;

            const chat = chats[currentChatId] || {};
            const title = chat.title || messages[0].content.substring(0, 30) + (messages[0].content.length > 30 ? '...' : '');

            chats[currentChatId] = {
                id: currentChatId,
                title: title,
                messages: messages,
                type: isWebCreating ? 'web' : (isHumanizing ? 'humanizer' : 'chat'),
                timestamp: Date.now()
            };
            localStorage.setItem('lumina_chats', JSON.stringify(chats));
            renderChatList();
        }

        function loadChat(id) {
            saveChat();
            currentChatId = id;
            const chat = chats[id];
            messages = chat.messages;
            isHumanizing = chat.type === 'humanizer';
            isWebCreating = chat.type === 'web';

            const container = document.getElementById('chatContainer');
            container.innerHTML = '';
            messages.forEach(msg => {
                renderMessage(msg.role, msg.content);
            });

            document.getElementById('welcome').style.display = 'none';
            renderChatList();
        }

        function renderChatList() {
            const list = document.getElementById('chatList');
            if (!list) return;
            list.innerHTML = '';

            const sortedChats = Object.values(chats).sort((a, b) => b.timestamp - a.timestamp);

            sortedChats.forEach(chat => {
                const item = document.createElement('div');
                item.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;

                let symbol = '';
                if (chat.type === 'web') {
                    symbol = '<span class="chat-symbol" style="color: #4cd964">&lt;/&gt;</span>';
                } else if (chat.type === 'humanizer') {
                    symbol = '<span class="chat-symbol" style="color: #ff2d55">{*}</span>'; // Brain-like symbol
                }

                item.innerHTML = `
                    <div class="chat-item-content" onclick="loadChat('${chat.id}')">
                        ${symbol}
                        <span>${chat.title}</span>
                    </div>
                    <button class="rename-btn" onclick="renameChat('${chat.id}', event)">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
                    </button>
                `;
                list.appendChild(item);
            });
        }

        function renameChat(id, event) {
            event.stopPropagation();
            const newTitle = prompt("Nuevo nombre para el chat:", chats[id].title);
            if (newTitle) {
                chats[id].title = newTitle;
                localStorage.setItem('lumina_chats', JSON.stringify(chats));
                renderChatList();
            }
        }

        function newChat() {
            saveChat();
            currentChatId = Date.now().toString();
            messages = [];
            isHumanizing = false;
            document.getElementById('chatContainer').innerHTML = `
                <div class="welcome" id="welcome">
                    <h1>¿Cómo puedo ayudarte hoy?</h1>
                    <div class="suggestions">
                        <div class="suggestion-bubble" onclick="useSuggestion('Explica la física cuántica de forma simple')">Explica la física cuántica...</div>
                        <div class="suggestion-bubble" onclick="useSuggestion('Escribe un poema sobre el mar')">Escribe un poema...</div>
                        <div class="suggestion-bubble" onclick="useSuggestion('Dime una receta saludable')">Dime una receta...</div>
                    </div>
                </div>
            `;
            renderChatList();
        }

        // ============================================
        // VALIDACIÓN INICIAL
        // ============================================
        function checkApiKey() {
            if (!GROQ_API_KEY || GROQ_API_KEY.includes('TU API KEY')) return false;
            return true;
        }

        window.onload = () => {
            renderChatList();
            checkCreditReset();
            checkOnboarding();
        };

        function checkOnboarding() {
            if (!userProfile) {
                document.getElementById('onboardingModal').classList.add('active');
            }
        }

        function saveOnboarding() {
            const fullName = document.getElementById('onboardFullName').value.trim();
            const nickname = document.getElementById('onboardNickname').value.trim();
            const instructions = document.getElementById('onboardInstructions').value.trim();

            if (!fullName || !nickname) {
                alert("Por favor rellena al menos tu nombre y apodo.");
                return;
            }

            userProfile = { fullName, nickname, instructions };
            localStorage.setItem('lumina_user', JSON.stringify(userProfile));
            document.getElementById('onboardingModal').classList.remove('active');
        }

        function openSettings() {
            if (!userProfile) userProfile = {};
            document.getElementById('setFullName').value = userProfile.fullName || '';
            document.getElementById('setNickname').value = userProfile.nickname || '';
            document.getElementById('setInstructions').value = userProfile.instructions || '';
            document.getElementById('settingsModal').classList.add('active');
        }

        function saveSettings() {
            userProfile.fullName = document.getElementById('setFullName').value.trim();
            userProfile.nickname = document.getElementById('setNickname').value.trim();
            userProfile.instructions = document.getElementById('setInstructions').value.trim();

            localStorage.setItem('lumina_user', JSON.stringify(userProfile));
            document.getElementById('settingsModal').classList.remove('active');
        }

        function closeSettings(e) {
            if (e.target.id === 'settingsModal') {
                document.getElementById('settingsModal').classList.remove('active');
            }
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                const content = e.target.result;
                const input = document.getElementById('messageInput');

                if (file.type.startsWith('image/')) {
                    // Para imágenes, como la API de Groq es principalmente texto, describimos el archivo
                    input.value += `\n[Archivo cargado: ${file.name} (Imagen)]\n`;
                } else {
                    // Para texto, incluimos el contenido
                    input.value += `\n--- CONTENIDO DE ${file.name} ---\n${content}\n--- FIN DE ARCHIVO ---\n`;
                }
                autoResize(input);
            };

            if (file.type.startsWith('image/')) {
                reader.readAsDataURL(file); // Podríamos usarlo si el modelo soporta vision
            } else {
                reader.readAsText(file);
            }
        }

        function updateModel() {
            saveChat();
        }

        // ============================================
        // TOOLS LOGIC
        // ============================================
        let webCredits = parseInt(localStorage.getItem('lumina_web_credits')) || 3;
        let lastCreditReset = localStorage.getItem('lumina_last_reset') || '';

        function checkCreditReset() {
            const today = new Date().toDateString();
            if (lastCreditReset !== today) {
                webCredits = 3;
                lastCreditReset = today;
                localStorage.setItem('lumina_web_credits', webCredits);
                localStorage.setItem('lumina_last_reset', lastCreditReset);
            }
            document.getElementById('webCredits').textContent = `${webCredits} créditos hoy`;
        }

        function toggleToolsMenu() {
            const menu = document.getElementById('toolsMenu');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        function openWebCreator() {
            checkCreditReset();
            if (webCredits <= 0) {
                alert("No te quedan créditos de Web Creator por hoy. Vuelve mañana.");
                return;
            }
            isWebCreating = true;
            isHumanizing = false;
            messages = [];
            currentChatId = Date.now().toString();
            const container = document.getElementById('chatContainer');
            container.innerHTML = `
                <div class="intro-menu" id="webIntro">
                    <div class="intro-img-placeholder">
                        <!-- Espacio para imagen manual -->
                        <span>[Inserta tu imagen aquí]</span>
                    </div>
                    <h2 class="intro-title">Web Creator</h2>
                    <p class="intro-desc">Convierte tus ideas en sitios web reales. Lumina diseñará y programará una página completa para ti en segundos con un estilo moderno.</p>
                    <button class="modal-btn" onclick="startFeature('web')">Comenzar a Crear</button>
                </div>
            `;
            toggleToolsMenu();
        }

        function startFeature(type) {
            const container = document.getElementById('chatContainer');
            if (type === 'web') {
                container.innerHTML = `
                    <div class="welcome">
                        <h1 style="font-size: 3rem; margin-top: 10vh;">¿QUÉ QUIERES CREAR?</h1>
                        <div class="suggestions">
                            <div class="suggestion-bubble" onclick="useSuggestion('Crea una landing page para una cafetería')">Landing page café</div>
                            <div class="suggestion-bubble" onclick="useSuggestion('Crea un portafolio minimalista')">Portafolio</div>
                            <div class="suggestion-bubble" onclick="useSuggestion('Crea una página de contacto moderna')">Página contacto</div>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="welcome">
                        <h1 style="font-size: 3rem; margin-top: 10vh;">HUMANIZADOR</h1>
                        <p>Pega tu texto y Lumina lo hará sonar natural.</p>
                    </div>
                `;
            }
        }

        function openAIDetector() {
            const text = prompt("Pega el texto que quieres analizar:");
            if (text) {
                const aiWords = ["en el vasto", "es fundamental", "en conclusión", "por otro lado", "cabe destacar", "en resumen", "además", "no obstante", "evidentemente", "como resultado"];
                let matchCount = 0;

                aiWords.forEach(word => {
                    const regex = new RegExp(`(${word})`, 'gi');
                    const matches = text.match(regex);
                    if (matches) matchCount += matches.length;
                });

                const wordCount = text.split(/\s+/).length || 1;
                const percentage = Math.min(100, Math.round((matchCount * 10 / wordCount) * 100));

                // Show result in chat first
                const container = document.getElementById('chatContainer');
                if (document.getElementById('welcome')) document.getElementById('welcome').style.display = 'none';

                const resDiv = document.createElement('div');
                resDiv.className = 'message assistant';
                resDiv.innerHTML = `
                    <div class="bubble">
                        <div class="detector-box" onclick="startHumanizing(\`${text.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`, 0)">Detección de IA: ${percentage}% (Haz clic para humanizar)</div>
                    </div>
                `;
                container.appendChild(resDiv);
                container.scrollTop = container.scrollHeight;

                toggleToolsMenu();
            } else {
                toggleToolsMenu();
            }
        }

        function startHumanizing(initialText = "", percentage = 0) {
            isHumanizing = true;
            isWebCreating = false;
            messages = [];
            currentChatId = Date.now().toString();
            const container = document.getElementById('chatContainer');

            container.innerHTML = `
                <div class="intro-menu" id="humanIntro">
                    <div class="intro-img-placeholder">
                        <!-- Espacio para imagen manual -->
                        <span>[Inserta tu imagen aquí]</span>
                    </div>
                    <h2 class="intro-title">Humanizador</h2>
                    <p class="intro-desc">Lumina analiza y reescribe textos generados por IA para darles un toque humano, natural y evitar detectores de IA.</p>
                    <button class="modal-btn" onclick="startFeature('human')">Comenzar a Humanizar</button>
                </div>
            `;

            if (initialText) {
                startFeature('human');
                document.getElementById('messageInput').value = initialText;
                autoResize(document.getElementById('messageInput'));
            }
            if (document.getElementById('toolsMenu').style.display === 'flex') toggleToolsMenu();
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
            
            const btn = document.getElementById('sendBtn');
            const hasText = textarea.value.trim().length > 0;
            const hasKey = GROQ_API_KEY && GROQ_API_KEY !== 'TU API KEY AQUÍ';
            
            if (hasText && hasKey) {
                btn.classList.add('active');
                btn.disabled = false;
            } else {
                btn.classList.remove('active');
                btn.disabled = true;
            }
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function showError(msg) {
            console.error('[Groq Chat Error]', msg);
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
            setTimeout(() => { errorBox.style.display = 'none'; }, 10000);
        }

        const ROBOT_ICON = `<svg viewBox="0 0 24 24"><path d="M12,2A2,2 0 0,1 14,4C14,4.74 13.59,5.39 13,5.73V7H14A3,3 0 0,1 17,10V11H18A2,2 0 0,1 20,13V17A2,2 0 0,1 18,19H17V20A2,2 0 0,1 15,22H9A2,2 0 0,1 7,20V19H6A2,2 0 0,1 4,17V13A2,2 0 0,1 6,11H7V10A3,3 0 0,1 10,7H11V5.73C10.41,5.39 10,4.74 10,4A2,2 0 0,1 12,2M7.5,13A1.5,1.5 0 0,0 6,14.5A1.5,1.5 0 0,0 7.5,16A1.5,1.5 0 0,0 9,14.5A1.5,1.5 0 0,0 7.5,13M16.5,13A1.5,1.5 0 0,0 15,14.5A1.5,1.5 0 0,0 16.5,16A1.5,1.5 0 0,0 18,14.5A1.5,1.5 0 0,0 16.5,13M12,14L10.75,17H13.25L12,14Z"/></svg>`;

        function addMessage(role, content) {
            messages.push({ role, content });
            const animate = role === 'assistant';
            renderMessage(role, content, animate);
            saveChat();
        }

        function renderMessage(role, content, animate = false) {
            const container = document.getElementById('chatContainer');
            const welcome = document.getElementById('welcome');
            if (welcome) welcome.style.display = 'none';
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            let formattedContent = content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            formattedContent = formattedContent
                .replace(/&lt;b&gt;/g, '<b>')
                .replace(/&lt;\/b&gt;/g, '</b>')
                .replace(/&lt;span class="ai-highlight"&gt;/g, '<span class="ai-highlight">')
                .replace(/&lt;\/span&gt;/g, '</span>')
                .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
            
            if (role === 'assistant') {
                const innerHTML = `
                    <div class="bubble fade-bottom">
                        <div class="avatar">${ROBOT_ICON}</div>
                        <div class="message-content typing-text"></div>
                    </div>
                `;
                messageDiv.innerHTML = innerHTML;
                container.appendChild(messageDiv);

                const target = messageDiv.querySelector('.typing-text');
                if (animate) {
                    typeWriter(target, formattedContent);
                } else {
                    target.innerHTML = formattedContent;
                }
            } else {
                messageDiv.innerHTML = `
                    <div class="bubble">
                        <div class="message-content">${formattedContent}</div>
                    </div>
                `;
                container.appendChild(messageDiv);
            }
            
            container.scrollTop = container.scrollHeight;
        }

        function typeWriter(element, html, speed = 5) {
            let i = 0;
            let currentHTML = "";
            const timer = setInterval(() => {
                if (i < html.length) {
                    if (html[i] === '<') {
                        const end = html.indexOf('>', i);
                        if (end !== -1) {
                            currentHTML += html.substring(i, end + 1);
                            i = end + 1;
                        } else {
                            currentHTML += html[i];
                            i++;
                        }
                    } else {
                        currentHTML += html[i];
                        i++;
                    }
                    element.innerHTML = currentHTML;
                    document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
                } else {
                    clearInterval(timer);
                    element.parentElement.classList.remove('fade-bottom');
                }
            }, speed);
        }

        async function sendMessage(overrideContent = null) {
            if (!checkApiKey()) return;
            
            const input = document.getElementById('messageInput');
            const model = document.getElementById('modelSelect').value;
            const content = overrideContent || input.value.trim();
            
            if (!content || isTyping) return;

            if (isWebCreating && messages.length === 0) {
                webCredits--;
                localStorage.setItem('lumina_web_credits', webCredits);
                checkCreditReset();
            }

            addMessage('user', content);
            
            // Crear copia de mensajes para la API con el system prompt
            const userNickname = userProfile?.nickname || "Usuario";
            const customInstructions = userProfile?.instructions || "";

            let systemPrompt = `Tu nombre es Lumina. Eres una asistente de IA avanzada, amable y eficiente. Te estás dirigiendo a ${userNickname}. ${customInstructions ? `Instrucciones del usuario: ${customInstructions}` : ""} Responde de forma resumida. Usa negritas para subtítulos. Agrega UN emoji UNICAMENTE al inicio de subtítulos en negrita (ej: 💡 **Título**). No uses emojis en ninguna otra parte del texto.`;

            if (isHumanizing) {
                systemPrompt = `Tu nombre es Lumina. Eres una asistente creada por Lumina AI. Actúa como un humanizador de texto profesional para ${userNickname}. Analiza el texto y reescríbelo para que sea 100% humano, natural y emocional. Elimina cualquier rastro de IA. Mantén el tono solicitado por el usuario si lo hay.`;
            } else if (isWebCreating) {
                systemPrompt = `Tu nombre es Lumina. Eres una Ingeniera de Software Senior especializada en Frontend Moderno.
                TAREA: Crear para ${userNickname} una aplicación web de una sola página (SPA) con diseño "Glassmorphism" estilo Apple.
                REGLAS ESTRICTAS:
                - Usa HTML5, CSS3 moderno (Flexbox/Grid) y JavaScript Vanilla.
                - Incluye todo en un ÚNICO bloque de código Markdown (\`\`\`html ... \`\`\`).
                - NO digas nada más que el código.
                - El diseño debe ser responsivo, elegante y profesional.
                - Usa fuentes de Google (Inter o SF Pro) y iconos de Lucide o FontAwesome vía CDN.
                - NO ALUCINES. Todo el código debe ser funcional y estar completo.`;
            }

            // Memoria: Enviar más contexto (hasta 20 mensajes si es posible)
            const apiMessages = [
                { role: "system", content: systemPrompt },
                ...messages.slice(-20)
            ];

            // Limpiar input si no es un comando de herramienta
            if (!overrideContent) {
                input.value = '';
                input.style.height = 'auto';
            }
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('sendBtn').classList.remove('active');

            // Mostrar typing
            isTyping = true;
            document.getElementById('typingIndicator').classList.add('active');
            
            console.log('[Request]', { model, messages_count: messages.length });

            try {
                if (isWebCreating || (isHumanizing && messages.length <= 2)) {
                    await handleSpecialFlow(content, apiMessages);
                    return;
                }

                const model = document.getElementById('modelSelect').value;
                const response = await fetch(`${BASE_URL}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GROQ_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: apiMessages,
                        temperature: 0.7,
                        max_tokens: 4096
                    })
                });

                console.log('[Response Status]', response.status, response.statusText);

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    console.error('[API Error]', errorData);
                    
                    let errorMsg = `Error ${response.status}: ${response.statusText}`;
                    
                    if (response.status === 401) {
                        errorMsg = 'Error 401: API Key inválida o expirada.\n\nVerifica tu clave en https://console.groq.com/keys';
                    } else if (response.status === 404) {
                    errorMsg = `Error 404: Modelo "${model}" no encontrado.`;
                    } else if (response.status === 429) {
                        errorMsg = 'Error 429: Límite de peticiones excedido.\n\nEspera un momento o verifica tus créditos en Groq.';
                    } else if (errorData.error?.message) {
                        errorMsg = `Error: ${errorData.error.message}`;
                    }
                    
                    throw new Error(errorMsg);
                }

                const data = await response.json();
                const assistantMessage = data.choices[0].message.content;
                
                document.getElementById('typingIndicator').classList.remove('active');

                if (isHumanizing && messages.length <= 2) {
                    renderHumanizerResult(assistantMessage);
                } else {
                    addMessage('assistant', assistantMessage);
                }

            } catch (error) {
                document.getElementById('typingIndicator').classList.remove('active');
                showError(error.message);
                console.error('[Catch Error]', error);
            } finally {
                isTyping = false;
            }
        }

        async function handleSpecialFlow(prompt, apiMessages) {
            const container = document.getElementById('chatContainer');
            const model = document.getElementById('modelSelect').value;
            document.getElementById('typingIndicator').classList.remove('active');

            // Mostrar animación de carga
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = `
                <div class="loading-container">
                    <div class="spinner"></div>
                    <div class="loading-text">Analizando...</div>
                </div>
            `;
            container.appendChild(loadingDiv);
            container.scrollTop = container.scrollHeight;

            await new Promise(r => setTimeout(r, 7000));
            loadingDiv.querySelector('.loading-text').textContent = 'Iniciando...';
            await new Promise(r => setTimeout(r, 4000));

            try {
                const response = await fetch(`${BASE_URL}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GROQ_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: apiMessages,
                        temperature: 0.7,
                        max_tokens: 4096
                    })
                });

                const data = await response.json();
                const content = data.choices[0].message.content;
                loadingDiv.remove();

                if (isWebCreating) {
                    // Robust extraction of code blocks
                    const match = content.match(/```(?:html|css|javascript|js|xml)?\s*([\s\S]*?)```/i);
                    const code = match ? match[1].trim() : content.trim();
                    renderCodeCanvas(code);
                    messages.push({ role: 'assistant', content: code });
                } else if (isHumanizing) {
                    renderHumanizerResult(content);
                }
                saveChat();

            } catch (error) {
                loadingDiv.remove();
                showError(error.message);
            } finally {
                isTyping = false;
            }
        }

        function highlightHTML(code) {
            // Simple approach: avoid recursive replacement
            let res = code
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // 1. Strings
            res = res.replace(/"([^"]*)"/g, '<span style="color: #ce9178">"$1"</span>');

            // 2. Tags
            res = res.replace(/(&lt;\/?[a-z0-9]+|&gt;)/gi, '<span style="color: #569cd6">$1</span>');

            // 3. Attributes (simplified - matching word before =)
            res = res.replace(/(\s)([a-z-]+)=/gi, '$1<span style="color: #9cdcfe">$2</span>=');

            return res;
        }

        function renderCodeCanvas(code) {
            const container = document.getElementById('chatContainer');
            const canvasDiv = document.createElement('div');
            canvasDiv.className = 'message assistant';
            canvasDiv.innerHTML = `
                <div class="canvas-container" style="z-index: 2000; position: relative;">
                    <div class="canvas-header">
                        <span>index.html</span>
                        <div style="display: flex; gap: 8px;">
                            <button class="copy-btn" style="background: var(--accent);" onclick="openPreviewFromBtn(this)">Vista Previa</button>
                            <button class="copy-btn" onclick="copyToClipboard(this)">Copiar</button>
                        </div>
                    </div>
                    <div class="canvas-content typing-text" style="pointer-events: auto;"></div>
                </div>
            `;
            container.appendChild(canvasDiv);
            const target = canvasDiv.querySelector('.canvas-content');
            target.dataset.rawCode = code;

            const highlighted = highlightHTML(code);
            typeWriter(target, highlighted, 5);
        }

        function renderHumanizerResult(content) {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';

            // Extraer porcentaje si existe en el estado anterior (simulado para la tarea)
            const percentage = Math.floor(Math.random() * 30) + 5; // Simulación de mejora

            messageDiv.innerHTML = `
                <div class="bubble">
                    <div class="detector-box">Detección de IA: ${percentage}% (Mejorado)</div>
                    <div class="canvas-container" style="background: var(--bg-glass);">
                        <div class="canvas-header">
                            <span>Texto Humanizado</span>
                            <button class="copy-btn" onclick="copyToClipboard(this)">Copiar</button>
                        </div>
                        <div class="canvas-content typing-text" style="color: var(--text-primary);"></div>
                    </div>
                </div>
            `;
            container.appendChild(messageDiv);
            const target = messageDiv.querySelector('.typing-text');
            target.dataset.rawCode = content;
            typeWriter(target, content);
            messages.push({ role: 'assistant', content });
            saveChat();
        }

        function copyToClipboard(btn) {
            const content = btn.closest('.canvas-container').querySelector('.canvas-content').dataset.rawCode;
            navigator.clipboard.writeText(content);
            btn.textContent = '¡Copiado!';
            setTimeout(() => btn.textContent = 'Copiar', 2000);
        }

        function openPreviewFromBtn(btn) {
            const code = btn.closest('.canvas-container').querySelector('.canvas-content').dataset.rawCode;
            openPreview(code);
        }

        function openPreview(code) {
            const overlay = document.getElementById('previewOverlay');
            const iframe = document.getElementById('previewIframe');
            iframe.srcdoc = code;
            overlay.style.display = 'flex';
        }

        function closePreview() {
            const overlay = document.getElementById('previewOverlay');
            const iframe = document.getElementById('previewIframe');
            iframe.srcdoc = '';
            overlay.style.display = 'none';
        }

        // Borrar la función duplicada de abajo si existe
    </script>
