<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina AI - Modern Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #343541;
            --bg-secondary: #444654;
            --bg-sidebar: #202123;
            --text-primary: #ffffff;
            --text-secondary: #8e8ea0;
            --accent: #10a37f;
            --accent-hover: #0d8c6d;
            --border: #4d4d4f;
            --error: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        .container { display: flex; height: 100vh; }

        .sidebar {
            width: 260px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 10px;
            transition: all 0.3s;
        }

        .sidebar-header {
            padding: 10px;
            margin-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 10px;
            margin: 4px 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
        .chat-item.active { background: rgba(255,255,255,0.1); color: var(--text-primary); }

        .new-chat-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            margin-bottom: 10px;
            transition: background 0.2s;
            font-size: 13px;
        }

        .new-chat-btn:hover { background: rgba(255,255,255,0.1); }

        .google-login-section {
            margin-top: auto;
            padding: 10px;
            border-top: 1px solid var(--border);
        }

        .main { flex: 1; display: flex; flex-direction: column; position: relative; }

        .header {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            font-weight: 600;
            background: var(--bg-primary);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0 100px 0;
            display: flex;
            flex-direction: column;
        }

        .welcome {
            text-align: center;
            margin-top: 20vh;
            color: var(--text-secondary);
            padding: 0 20px;
        }

        .welcome h1 { color: var(--text-primary); font-size: 2rem; margin-bottom: 10px; }

        .message {
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 850px;
            margin: 5px auto;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { align-items: flex-end; }
        .message.assistant { align-items: flex-start; }

        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 80%;
            line-height: 1.5;
            position: relative;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message.user .bubble {
            background: #007aff;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .bubble {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            display: flex;
            gap: 12px;
        }

        .avatar {
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .avatar svg { width: 100%; height: 100%; fill: var(--accent); }

        .message-content { flex: 1; white-space: pre-wrap; word-break: break-word; }
        .message-content p { margin-bottom: 10px; }
        .message-content code {
            background: rgba(0,0,0,0.2); padding: 2px 6px;
            border-radius: 3px; font-family: 'Courier New', monospace;
        }
        .message-content pre {
            background: rgba(0,0,0,0.3); padding: 15px;
            border-radius: 6px; overflow-x: auto; margin: 10px 0;
        }

        .input-container {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, var(--bg-primary), transparent);
            padding: 20px;
        }

        .input-wrapper {
            max-width: 800px; margin: 0 auto; position: relative;
            background: var(--bg-secondary); border: 1px solid var(--border);
            border-radius: 20px; box-shadow: 0 0 15px rgba(0,0,0,0.3);
            display: flex; align-items: flex-end; padding: 6px 12px;
        }

        .plus-btn {
            background: transparent; border: none; color: var(--text-secondary);
            width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; transition: all 0.2s;
        }
        .plus-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }

        .model-select-mini {
            background: transparent; border: none; color: var(--text-secondary);
            font-size: 11px; padding: 4px 8px; cursor: pointer; outline: none;
            max-width: 120px;
        }

        .message-input {
            flex: 1; background: transparent; border: none;
            color: var(--text-primary); padding: 8px 10px;
            font-size: 15px; resize: none; outline: none;
            min-height: 36px; max-height: 200px; font-family: inherit;
        }

        .send-btn {
            background: var(--text-secondary); color: white;
            border: none; width: 32px; height: 32px;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; margin-bottom: 2px;
        }

        .send-btn.active { background: var(--accent); }
        .send-btn.active:hover { background: var(--accent-hover); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .typing-indicator { display: none; padding: 20px; background: var(--bg-secondary); }
        .typing-indicator.active { display: flex; }

        .dots { display: flex; gap: 4px; align-items: center; }

        /* Tools Menu */
        .tools-menu {
            position: absolute;
            bottom: 70px;
            left: 20px;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px;
            width: 250px;
            display: none;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .tool-btn {
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            transition: background 0.2s;
            text-align: left;
        }

        .tool-btn:hover { background: rgba(255,255,255,0.1); }
        .tool-btn small { color: var(--text-secondary); font-size: 11px; }

        /* AI Detector Result Styling */
        .ai-highlight {
            color: #ef4444;
            text-decoration: underline;
            font-weight: bold;
        }
        .dot {
            width: 8px; height: 8px; background: var(--text-secondary);
            border-radius: 50%; animation: bounce 1.4s infinite ease-in-out;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .error-box {
            background: var(--error); color: white;
            padding: 12px; border-radius: 6px;
            margin: 10px auto; max-width: 800px;
            font-size: 14px; display: none;
            white-space: pre-wrap;
        }

        .api-status {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; margin-right: 5px;
            background: var(--error);
        }
        .api-status.ready { background: var(--accent); }

        @media (max-width: 768px) { .sidebar { display: none; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="newChat()">
                    <span>+</span> Nuevo chat
                </button>
            </div>

            <div class="chat-list" id="chatList">
                <!-- Chats se cargan aquí -->
            </div>

            <div class="google-login-section">
                <div id="g_id_onload"
                     data-client_id="YOUR_GOOGLE_CLIENT_ID"
                     data-callback="handleCredentialResponse">
                </div>
                <div class="g_id_signin" data-type="standard"></div>
            </div>
        </div>

        <div class="main">
            <div class="header">Lumina AI</div>

            <div class="error-box" id="errorBox"></div>

            <div class="chat-container" id="chatContainer">
                <div class="welcome" id="welcome">
                    <h1>¿Cómo puedo ayudarte hoy?</h1>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <div class="message assistant">
                    <div class="bubble">
                        <div class="dots">
                            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="tools-menu" id="toolsMenu">
                    <button class="tool-btn" onclick="openWebCreator()">
                        <div>
                            <div>:: Crear página web</div>
                            <small id="webCredits">3 créditos hoy</small>
                        </div>
                    </button>
                    <button class="tool-btn" onclick="openAIDetector()">
                        <div>
                            <div>?> Detector de IA</div>
                            <small>Subraya texto artificial</small>
                        </div>
                    </button>
                </div>
                <div class="input-wrapper">
                    <button class="plus-btn" onclick="toggleToolsMenu()">+</button>
                    <select class="model-select-mini" id="modelSelect" onchange="updateModel()">
                        <option value="openai/gpt-oss-120b" selected>GPT OSS 120B</option>
                        <option value="openai/gpt-oss-20b">GPT OSS 20B</option>
                        <option value="openai/gpt-oss-safeguard-20b">GPT OSS Safeguard</option>
                        <option value="llama-3.1-8b-instant">Llama 3.1 8B</option>
                        <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
                        <option value="gemma2-9b-it">Gemma2 9B</option>
                    </select>
                    <textarea 
                        class="message-input" 
                        id="messageInput" 
                        placeholder="Escribe un mensaje..."
                        rows="1"
                        oninput="autoResize(this)"
                        onkeydown="handleKeyDown(event)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>↑</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        // ============================================
        // CONFIGURACIÓN - PEGA TU API KEY AQUÍ
        // ============================================
        const GROQ_API_KEY = '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';
        
        // ============================================
        // ESTADO GLOBAL
        // ============================================
        const BASE_URL = "https://api.groq.com/openai/v1";
        let currentChatId = Date.now().toString();
        let chats = JSON.parse(localStorage.getItem('lumina_chats')) || {};
        let messages = [];
        let isTyping = false;
        let currentUser = null;
        let isHumanizing = false;

        // ============================================
        // GOOGLE LOGIN
        // ============================================
        function handleCredentialResponse(response) {
            const responsePayload = parseJwt(response.credential);
            currentUser = {
                id: responsePayload.sub,
                name: responsePayload.name,
                email: responsePayload.email,
                picture: responsePayload.picture
            };
            console.log("Logged in as: " + currentUser.name);
            alert("Bienvenido, " + currentUser.name);
        }

        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        // ============================================
        // HISTORIAL DE CHATS
        // ============================================
        function saveChat() {
            if (messages.length === 0) return;

            const title = messages[0].content.substring(0, 30) + (messages[0].content.length > 30 ? '...' : '');
            chats[currentChatId] = {
                id: currentChatId,
                title: title,
                messages: messages,
                model: document.getElementById('modelSelect').value,
                timestamp: Date.now()
            };
            localStorage.setItem('lumina_chats', JSON.stringify(chats));
            renderChatList();
        }

        function loadChat(id) {
            saveChat(); // Guardar el actual antes de cambiar
            currentChatId = id;
            const chat = chats[id];
            messages = chat.messages;
            document.getElementById('modelSelect').value = chat.model;

            // Re-renderizar UI
            const container = document.getElementById('chatContainer');
            container.innerHTML = '';
            messages.forEach(msg => {
                renderMessage(msg.role, msg.content);
            });

            document.getElementById('welcome').style.display = 'none';
            renderChatList();
        }

        function renderChatList() {
            const list = document.getElementById('chatList');
            list.innerHTML = '';

            const sortedChats = Object.values(chats).sort((a, b) => b.timestamp - a.timestamp);

            sortedChats.forEach(chat => {
                const item = document.createElement('div');
                item.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                item.onclick = () => loadChat(chat.id);
                item.innerHTML = `[ ] ${chat.title}`;
                list.appendChild(item);
            });
        }

        function newChat() {
            saveChat();
            currentChatId = Date.now().toString();
            messages = [];
            isHumanizing = false;
            document.getElementById('chatContainer').innerHTML = `
                <div class="welcome" id="welcome">
                    <h1>¿Cómo puedo ayudarte hoy?</h1>
                </div>
            `;
            renderChatList();
        }

        // ============================================
        // VALIDACIÓN INICIAL
        // ============================================
        function checkApiKey() {
            if (!GROQ_API_KEY || GROQ_API_KEY.includes('TU API KEY')) return false;
            return true;
        }

        window.onload = () => {
            renderChatList();
            checkCreditReset();
            const savedModel = localStorage.getItem('groq_model');
            if (savedModel) document.getElementById('modelSelect').value = savedModel;
        };

        function updateModel() {
            const select = document.getElementById('modelSelect');
            localStorage.setItem('groq_model', select.value);
            saveChat();
        }

        // ============================================
        // TOOLS LOGIC
        // ============================================
        let webCredits = parseInt(localStorage.getItem('lumina_web_credits')) || 3;
        let lastCreditReset = localStorage.getItem('lumina_last_reset') || '';

        function checkCreditReset() {
            const today = new Date().toDateString();
            if (lastCreditReset !== today) {
                webCredits = 3;
                lastCreditReset = today;
                localStorage.setItem('lumina_web_credits', webCredits);
                localStorage.setItem('lumina_last_reset', lastCreditReset);
            }
            document.getElementById('webCredits').textContent = `${webCredits} créditos hoy`;
        }

        function toggleToolsMenu() {
            const menu = document.getElementById('toolsMenu');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        function openWebCreator() {
            checkCreditReset();
            if (webCredits <= 0) {
                alert("No te quedan créditos de Web Creator por hoy. Vuelve mañana.");
                return;
            }
            const prompt = prompt("¿Qué tipo de página web quieres crear? (Ej: Una landing page de café)");
            if (prompt) {
                webCredits--;
                localStorage.setItem('lumina_web_credits', webCredits);
                checkCreditReset();
                sendMessage(`ACTÚA COMO WEB CREATOR: Crea el código HTML/CSS completo para: ${prompt}. Responde solo con el código dentro de un bloque de código.`);
            }
            toggleToolsMenu();
        }

        function openAIDetector() {
            const text = prompt("Pega el texto que quieres analizar:");
            if (text) {
                const aiWords = ["en el vasto", "es fundamental", "en conclusión", "por otro lado", "cabe destacar", "en resumen", "además", "no obstante", "evidentemente", "como resultado"];
                let matchCount = 0;
                let detectedText = text;

                aiWords.forEach(word => {
                    const regex = new RegExp(`(${word})`, 'gi');
                    const matches = text.match(regex);
                    if (matches) {
                        matchCount += matches.length;
                        detectedText = detectedText.replace(regex, '<span class="ai-highlight">$1</span>');
                    }
                });

                const wordCount = text.split(/\s+/).length || 1;
                const percentage = Math.min(100, Math.round((matchCount * 10 / wordCount) * 100));

                const resultMsg = `<b>Resultado del Análisis: ${percentage}% IA</b><br><br>${detectedText}<br><br><small>(Haz clic aquí para humanizar este texto)</small>`;

                // Renderizar un mensaje especial que es clicable
                const container = document.getElementById('chatContainer');
                const welcome = document.getElementById('welcome');
                if (welcome) welcome.style.display = 'none';

                const messageDiv = document.createElement('div');
                messageDiv.className = `message assistant`;
                messageDiv.onclick = () => startHumanizing(text);
                messageDiv.style.cursor = 'pointer';

                let formattedContent = resultMsg
                    .replace(/&lt;span class="ai-highlight"&gt;/g, '<span class="ai-highlight">')
                    .replace(/&lt;\/span&gt;/g, '</span>');

                messageDiv.innerHTML = `
                    <div class="bubble">
                        <div class="avatar">${ROBOT_ICON}</div>
                        <div class="message-content">${formattedContent}</div>
                    </div>
                `;
                container.appendChild(messageDiv);
                container.scrollTop = container.scrollHeight;
            }
            toggleToolsMenu();
        }

        function startHumanizing(initialText = "") {
            isHumanizing = true;
            messages = [];
            const container = document.getElementById('chatContainer');
            container.innerHTML = `
                <div class="welcome" id="welcome">
                    <h1 style="font-size: 3rem; margin-top: 10vh;">¿QUE QUIERES HUMANIZAR?</h1>
                    <p>Pega el texto abajo para que Lumina lo vuelva más humano.</p>
                </div>
            `;
            if (initialText) {
                document.getElementById('messageInput').value = initialText;
                autoResize(document.getElementById('messageInput'));
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
            
            const btn = document.getElementById('sendBtn');
            const hasText = textarea.value.trim().length > 0;
            const hasKey = GROQ_API_KEY && GROQ_API_KEY !== 'TU API KEY AQUÍ';
            
            if (hasText && hasKey) {
                btn.classList.add('active');
                btn.disabled = false;
            } else {
                btn.classList.remove('active');
                btn.disabled = true;
            }
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function showError(msg) {
            console.error('[Groq Chat Error]', msg);
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
            setTimeout(() => { errorBox.style.display = 'none'; }, 10000);
        }

        const ROBOT_ICON = `<svg viewBox="0 0 24 24"><path d="M12,2A2,2 0 0,1 14,4C14,4.74 13.59,5.39 13,5.73V7H14A3,3 0 0,1 17,10V11H18A2,2 0 0,1 20,13V17A2,2 0 0,1 18,19H17V20A2,2 0 0,1 15,22H9A2,2 0 0,1 7,20V19H6A2,2 0 0,1 4,17V13A2,2 0 0,1 6,11H7V10A3,3 0 0,1 10,7H11V5.73C10.41,5.39 10,4.74 10,4A2,2 0 0,1 12,2M7.5,13A1.5,1.5 0 0,0 6,14.5A1.5,1.5 0 0,0 7.5,16A1.5,1.5 0 0,0 9,14.5A1.5,1.5 0 0,0 7.5,13M16.5,13A1.5,1.5 0 0,0 15,14.5A1.5,1.5 0 0,0 16.5,16A1.5,1.5 0 0,0 18,14.5A1.5,1.5 0 0,0 16.5,13M12,14L10.75,17H13.25L12,14Z"/></svg>`;

        function addMessage(role, content) {
            messages.push({ role, content });
            renderMessage(role, content);
            saveChat();
        }

        function renderMessage(role, content) {
            const container = document.getElementById('chatContainer');
            const welcome = document.getElementById('welcome');
            if (welcome) welcome.style.display = 'none';
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            // Limpiar etiquetas de la IA si vienen como string pero procesar las nuestras
            let formattedContent = content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // Fix <b> tag error: convert escaped tags back for safe ones we want
            formattedContent = formattedContent
                .replace(/&lt;b&gt;/g, '<b>')
                .replace(/&lt;\/b&gt;/g, '</b>')
                .replace(/&lt;span class="ai-highlight"&gt;/g, '<span class="ai-highlight">')
                .replace(/&lt;\/span&gt;/g, '</span>')
                .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
            
            if (role === 'assistant') {
                messageDiv.innerHTML = `
                    <div class="bubble">
                        <div class="avatar">${ROBOT_ICON}</div>
                        <div class="message-content">${formattedContent}</div>
                    </div>
                `;
            } else {
                messageDiv.innerHTML = `
                    <div class="bubble">
                        <div class="message-content">${formattedContent}</div>
                    </div>
                `;
            }
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage(overrideContent = null) {
            if (!checkApiKey()) return;
            
            const input = document.getElementById('messageInput');
            const model = document.getElementById('modelSelect').value;
            const content = overrideContent || input.value.trim();
            
            if (!content || isTyping) return;

            addMessage('user', content);
            
            // Crear copia de mensajes para la API con el system prompt
            let systemPrompt = "Responde de forma resumida. Usa negritas para subtítulos. Agrega UN emoji UNICAMENTE al inicio de subtítulos en negrita (ej: 💡 **Título**). No uses emojis en ninguna otra parte del texto.";

            if (isHumanizing) {
                systemPrompt = "Actúa como un humanizador de texto profesional. Analiza el texto proporcionado y reescríbelo para que suene completamente natural, humano y evite patrones típicos de IA. Mantén el significado original.";
            }

            const apiMessages = [
                { role: "system", content: systemPrompt },
                ...messages.slice(-10)
            ];

            // Limpiar input si no es un comando de herramienta
            if (!overrideContent) {
                input.value = '';
                input.style.height = 'auto';
            }
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('sendBtn').classList.remove('active');

            // Mostrar typing
            isTyping = true;
            document.getElementById('typingIndicator').classList.add('active');
            
            console.log('[Request]', { model, messages_count: messages.length });

            try {
                const response = await fetch(`${BASE_URL}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GROQ_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: apiMessages,
                        temperature: 0.7,
                        max_tokens: 4096
                    })
                });

                console.log('[Response Status]', response.status, response.statusText);

                // Manejo detallado de errores HTTP
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    console.error('[API Error]', errorData);
                    
                    let errorMsg = `Error ${response.status}: ${response.statusText}`;
                    
                    if (response.status === 401) {
                        errorMsg = 'Error 401: API Key inválida o expirada.\n\nVerifica tu clave en https://console.groq.com/keys';
                    } else if (response.status === 404) {
                        errorMsg = `Error 404: Modelo "${model}" no encontrado.\n\nEste modelo puede haber sido eliminado. Prueba con "Llama 3.3 70B" que es el más estable.`;
                    } else if (response.status === 429) {
                        errorMsg = 'Error 429: Límite de peticiones excedido.\n\nEspera un momento o verifica tus créditos en Groq.';
                    } else if (errorData.error?.message) {
                        errorMsg = `Error: ${errorData.error.message}`;
                    }
                    
                    throw new Error(errorMsg);
                }

                const data = await response.json();
                const assistantMessage = data.choices[0].message.content;
                
                document.getElementById('typingIndicator').classList.remove('active');
                addMessage('assistant', assistantMessage);

            } catch (error) {
                document.getElementById('typingIndicator').classList.remove('active');
                showError(error.message);
                console.error('[Catch Error]', error);
            } finally {
                isTyping = false;
            }
        }

        // Borrar la función duplicada de abajo si existe
    </script>
</body>
</html>
