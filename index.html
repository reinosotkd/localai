<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina AI - Modern Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-glass: rgba(255, 255, 255, 0.05);
            --bg-glass-heavy: rgba(255, 255, 255, 0.1);
            --bg-primary: #0a0a0c;
            --bg-secondary: rgba(255, 255, 255, 0.08);
            --bg-sidebar: rgba(0, 0, 0, 0.4);
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            --accent: #0071e3;
            --accent-hover: #0077ed;
            --border: rgba(255, 255, 255, 0.1);
            --error: #ff453a;
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a1c 0%, #0a0a0c 100%);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .container { display: flex; height: 100vh; }

        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 15px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 100;
        }

        .sidebar.hidden {
            transform: translateX(-100%);
            margin-right: -280px;
        }

        .sidebar-header {
            padding-bottom: 20px;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 10px;
            margin: 4px 0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-item:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
        .chat-item.active { background: rgba(255,255,255,0.1); color: var(--text-primary); }

        .new-chat-btn {
            background: var(--bg-glass);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            margin-bottom: 20px;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(10px);
        }

        .new-chat-btn:hover {
            background: var(--bg-glass-heavy);
            transform: scale(1.02);
        }

        .google-login-section {
            margin-top: auto;
            padding: 10px;
            border-top: 1px solid var(--border);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background: transparent;
        }

        .header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(10, 10, 12, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        .toggle-sidebar-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toggle-sidebar-btn:hover {
            background: var(--bg-glass);
            color: var(--text-primary);
        }

        .gpt-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
            background: var(--bg-glass);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0 100px 0;
            display: flex;
            flex-direction: column;
        }

        .welcome {
            text-align: center;
            margin-top: 20vh;
            color: var(--text-secondary);
            padding: 0 20px;
        }

        .welcome h1 { color: var(--text-primary); font-size: 2rem; margin-bottom: 10px; }

        .message {
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 850px;
            margin: 5px auto;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { align-items: flex-end; }
        .message.assistant { align-items: flex-start; }

        .bubble {
            padding: 14px 18px;
            border-radius: 22px;
            max-width: 85%;
            line-height: 1.6;
            position: relative;
            box-shadow: var(--shadow);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
        }

        .message.user .bubble {
            background: var(--accent);
            color: white;
            border-bottom-right-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .message.assistant .bubble {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-bottom-left-radius: 6px;
            display: flex;
            gap: 12px;
        }

        .avatar {
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        .avatar svg { width: 100%; height: 100%; fill: var(--accent); }

        .message-content { flex: 1; white-space: pre-wrap; word-break: break-word; }
        .message-content p { margin-bottom: 10px; }
        .message-content code {
            background: rgba(0,0,0,0.2); padding: 2px 6px;
            border-radius: 3px; font-family: 'Courier New', monospace;
        }
        .message-content pre {
            background: rgba(0,0,0,0.3); padding: 15px;
            border-radius: 6px; overflow-x: auto; margin: 10px 0;
        }

        .input-container {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, var(--bg-primary), transparent);
            padding: 20px;
        }

        .input-wrapper {
            max-width: 800px; margin: 0 auto; position: relative;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px; box-shadow: var(--shadow);
            display: flex; align-items: flex-end; padding: 10px 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-wrapper:focus-within {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .plus-btn {
            background: transparent; border: none; color: var(--text-secondary);
            width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; transition: all 0.2s;
        }
        .plus-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }

        .message-input {
            flex: 1; background: transparent; border: none;
            color: var(--text-primary); padding: 8px 10px;
            font-size: 15px; resize: none; outline: none;
            min-height: 36px; max-height: 200px; font-family: inherit;
        }

        .send-btn {
            background: var(--text-secondary); color: white;
            border: none; width: 32px; height: 32px;
            border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; margin-bottom: 2px;
        }

        .send-btn.active { background: var(--accent); }
        .send-btn.active:hover { background: var(--accent-hover); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .typing-indicator { display: none; padding: 20px; background: var(--bg-secondary); }
        .typing-indicator.active { display: flex; }

        .dots { display: flex; gap: 4px; align-items: center; }

        /* Suggestion Bubbles */
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
            max-width: 600px;
        }

        .suggestion-bubble {
            background: var(--bg-glass);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .suggestion-bubble:hover {
            background: var(--bg-glass-heavy);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        /* Loading Animation */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin: 20px 0;
            padding: 20px;
            background: var(--bg-glass);
            border-radius: 16px;
            border: 1px solid var(--border);
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Canvas / Code Display */
        .canvas-container {
            width: 100%;
            background: #1e1e1e;
            border-radius: 12px;
            margin-top: 15px;
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }

        .canvas-header {
            background: #2d2d2d;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #aaa;
        }

        .copy-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }

        .canvas-content {
            padding: 15px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.5;
            color: #d4d4d4;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* Incremental Text Animation */
        .typing-text {
            display: inline;
        }

        .fade-bottom {
            position: relative;
        }

        .fade-bottom::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 20px;
            background: linear-gradient(to top, var(--bg-primary), transparent);
            pointer-events: none;
            opacity: 0.5;
        }

        /* Specialized Box for Detector */
        .detector-box {
            background: rgba(255, 69, 58, 0.15);
            border: 1px solid var(--error);
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            display: inline-block;
            font-weight: 600;
            color: var(--error);
        }

        /* Tools Menu */
        .tools-menu {
            position: absolute;
            bottom: 85px;
            left: 20px;
            background: rgba(20, 20, 25, 0.8);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 12px;
            width: 260px;
            display: none;
            flex-direction: column;
            gap: 8px;
            box-shadow: var(--shadow);
            z-index: 1000;
        }

        .tool-btn {
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            transition: background 0.2s;
            text-align: left;
        }

        .tool-btn:hover { background: var(--bg-glass); }
        .tool-btn small { color: var(--text-secondary); font-size: 12px; }

        /* AI Detector Result Styling */
        .ai-highlight {
            color: #ef4444;
            text-decoration: underline;
            font-weight: bold;
        }
        .dot {
            width: 8px; height: 8px; background: var(--text-secondary);
            border-radius: 50%; animation: bounce 1.4s infinite ease-in-out;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .error-box {
            background: var(--error); color: white;
            padding: 12px; border-radius: 6px;
            margin: 10px auto; max-width: 800px;
            font-size: 14px; display: none;
            white-space: pre-wrap;
        }

        .api-status {
            display: inline-block; width: 8px; height: 8px;
            border-radius: 50%; margin-right: 5px;
            background: var(--error);
        }
        .api-status.ready { background: var(--accent); }

        @media (max-width: 768px) { .sidebar { display: none; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="newChat()">
                    <span>+</span> Nuevo chat
                </button>
            </div>

            <div class="chat-list" id="chatList">
                <!-- Chats se cargan aquí -->
            </div>

            <div class="google-login-section">
                <div id="g_id_onload"
                     data-client_id="YOUR_GOOGLE_CLIENT_ID"
                     data-callback="handleCredentialResponse">
                </div>
                <div class="g_id_signin" data-type="standard"></div>
            </div>
        </div>

        <div class="main">
            <div class="header">
                <div class="header-left">
                    <button class="toggle-sidebar-btn" onclick="toggleSidebar()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                    </button>
                    <span>Lumina AI</span>
                </div>
                <div class="gpt-label">GPT-4.5</div>
            </div>

            <div class="error-box" id="errorBox"></div>

            <div class="chat-container" id="chatContainer">
                <div class="welcome" id="welcome">
                    <h1>¿Cómo puedo ayudarte hoy?</h1>
                    <div class="suggestions">
                        <div class="suggestion-bubble" onclick="useSuggestion('Explica la física cuántica de forma simple')">Explica la física cuántica...</div>
                        <div class="suggestion-bubble" onclick="useSuggestion('Escribe un poema sobre el mar')">Escribe un poema...</div>
                        <div class="suggestion-bubble" onclick="useSuggestion('Dime una receta saludable')">Dime una receta...</div>
                    </div>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <div class="message assistant">
                    <div class="bubble">
                        <div class="dots">
                            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="tools-menu" id="toolsMenu">
                    <button class="tool-btn" onclick="openWebCreator()">
                        <div>
                            <div>:: Crear página web</div>
                            <small id="webCredits">3 créditos hoy</small>
                        </div>
                    </button>
                    <button class="tool-btn" onclick="openAIDetector()">
                        <div>
                            <div>?> Detector de IA</div>
                            <small>Subraya texto artificial</small>
                        </div>
                    </button>
                </div>
                <div class="input-wrapper">
                    <button class="plus-btn" onclick="toggleToolsMenu()">+</button>
                    <textarea 
                        class="message-input" 
                        id="messageInput" 
                        placeholder="Escribe un mensaje..."
                        rows="1"
                        oninput="autoResize(this)"
                        onkeydown="handleKeyDown(event)"></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>↑</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        // ============================================
        // CONFIGURACIÓN - PEGA TU API KEY AQUÍ
        // ============================================
        const GROQ_API_KEY = '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';
        
        // ============================================
        // ESTADO GLOBAL
        // ============================================
        const BASE_URL = "https://api.groq.com/openai/v1";
        let currentChatId = Date.now().toString();
        let chats = JSON.parse(localStorage.getItem('lumina_chats')) || {};
        let messages = [];
        let isTyping = false;
        let currentUser = null;
        let isHumanizing = false;
        let isWebCreating = false;

        // ============================================
        // GOOGLE LOGIN
        // ============================================
        function handleCredentialResponse(response) {
            const responsePayload = parseJwt(response.credential);
            currentUser = {
                id: responsePayload.sub,
                name: responsePayload.name,
                email: responsePayload.email,
                picture: responsePayload.picture
            };
            console.log("Logged in as: " + currentUser.name);
            alert("Bienvenido, " + currentUser.name);
        }

        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        // ============================================
        // HISTORIAL DE CHATS
        // ============================================
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('hidden');
        }

        function useSuggestion(text) {
            document.getElementById('messageInput').value = text;
            autoResize(document.getElementById('messageInput'));
            sendMessage();
        }

        function saveChat() {
            if (messages.length === 0) return;

            const title = messages[0].content.substring(0, 30) + (messages[0].content.length > 30 ? '...' : '');
            chats[currentChatId] = {
                id: currentChatId,
                title: title,
                messages: messages,
                model: "openai/gpt-oss-120b",
                timestamp: Date.now()
            };
            localStorage.setItem('lumina_chats', JSON.stringify(chats));
            renderChatList();
        }

        function loadChat(id) {
            saveChat();
            currentChatId = id;
            const chat = chats[id];
            messages = chat.messages;
            isHumanizing = false;
            isWebCreating = false;

            const container = document.getElementById('chatContainer');
            container.innerHTML = '';
            messages.forEach(msg => {
                renderMessage(msg.role, msg.content);
            });

            document.getElementById('welcome').style.display = 'none';
            renderChatList();
        }

        function renderChatList() {
            const list = document.getElementById('chatList');
            list.innerHTML = '';

            const sortedChats = Object.values(chats).sort((a, b) => b.timestamp - a.timestamp);

            sortedChats.forEach(chat => {
                const item = document.createElement('div');
                item.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
                item.onclick = () => loadChat(chat.id);
                item.innerHTML = `[ ] ${chat.title}`;
                list.appendChild(item);
            });
        }

        function newChat() {
            saveChat();
            currentChatId = Date.now().toString();
            messages = [];
            isHumanizing = false;
            document.getElementById('chatContainer').innerHTML = `
                <div class="welcome" id="welcome">
                    <h1>¿Cómo puedo ayudarte hoy?</h1>
                    <div class="suggestions">
                        <div class="suggestion-bubble" onclick="useSuggestion('Explica la física cuántica de forma simple')">Explica la física cuántica...</div>
                        <div class="suggestion-bubble" onclick="useSuggestion('Escribe un poema sobre el mar')">Escribe un poema...</div>
                        <div class="suggestion-bubble" onclick="useSuggestion('Dime una receta saludable')">Dime una receta...</div>
                    </div>
                </div>
            `;
            renderChatList();
        }

        // ============================================
        // VALIDACIÓN INICIAL
        // ============================================
        function checkApiKey() {
            if (!GROQ_API_KEY || GROQ_API_KEY.includes('TU API KEY')) return false;
            return true;
        }

        window.onload = () => {
            renderChatList();
            checkCreditReset();
        };

        function updateModel() {
            saveChat();
        }

        // ============================================
        // TOOLS LOGIC
        // ============================================
        let webCredits = parseInt(localStorage.getItem('lumina_web_credits')) || 3;
        let lastCreditReset = localStorage.getItem('lumina_last_reset') || '';

        function checkCreditReset() {
            const today = new Date().toDateString();
            if (lastCreditReset !== today) {
                webCredits = 3;
                lastCreditReset = today;
                localStorage.setItem('lumina_web_credits', webCredits);
                localStorage.setItem('lumina_last_reset', lastCreditReset);
            }
            document.getElementById('webCredits').textContent = `${webCredits} créditos hoy`;
        }

        function toggleToolsMenu() {
            const menu = document.getElementById('toolsMenu');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        function openWebCreator() {
            checkCreditReset();
            if (webCredits <= 0) {
                alert("No te quedan créditos de Web Creator por hoy. Vuelve mañana.");
                return;
            }
            isWebCreating = true;
            isHumanizing = false;
            messages = [];
            const container = document.getElementById('chatContainer');
            container.innerHTML = `
                <div class="welcome" id="welcome">
                    <h1 style="font-size: 3rem; margin-top: 10vh;">¿QUE QUIERES CREAR?</h1>
                    <div class="suggestions">
                        <div class="suggestion-bubble" onclick="useSuggestion('Crea una landing page para una cafetería')">Landing page café</div>
                        <div class="suggestion-bubble" onclick="useSuggestion('Crea un portafolio minimalista')">Portafolio</div>
                        <div class="suggestion-bubble" onclick="useSuggestion('Crea una página de contacto moderna')">Página contacto</div>
                    </div>
                </div>
            `;
            toggleToolsMenu();
        }

        function openAIDetector() {
            const text = prompt("Pega el texto que quieres analizar:");
            if (text) {
                const aiWords = ["en el vasto", "es fundamental", "en conclusión", "por otro lado", "cabe destacar", "en resumen", "además", "no obstante", "evidentemente", "como resultado"];
                let matchCount = 0;

                aiWords.forEach(word => {
                    const regex = new RegExp(`(${word})`, 'gi');
                    const matches = text.match(regex);
                    if (matches) matchCount += matches.length;
                });

                const wordCount = text.split(/\s+/).length || 1;
                const percentage = Math.min(100, Math.round((matchCount * 10 / wordCount) * 100));

                startHumanizing(text, percentage);
            }
            toggleToolsMenu();
        }

        function startHumanizing(initialText = "", percentage = 0) {
            isHumanizing = true;
            isWebCreating = false;
            messages = [];
            const container = document.getElementById('chatContainer');
            container.innerHTML = `
                <div class="welcome" id="welcome">
                    <h1 style="font-size: 3rem; margin-top: 10vh;">¿QUE QUIERES HUMANIZAR?</h1>
                    ${percentage > 0 ? `<div class="detector-box">Detección de IA: ${percentage}%</div>` : ''}
                    <p>Pega el texto abajo para que Lumina lo vuelva más humano.</p>
                </div>
            `;
            if (initialText) {
                document.getElementById('messageInput').value = initialText;
                autoResize(document.getElementById('messageInput'));
            }
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
            
            const btn = document.getElementById('sendBtn');
            const hasText = textarea.value.trim().length > 0;
            const hasKey = GROQ_API_KEY && GROQ_API_KEY !== 'TU API KEY AQUÍ';
            
            if (hasText && hasKey) {
                btn.classList.add('active');
                btn.disabled = false;
            } else {
                btn.classList.remove('active');
                btn.disabled = true;
            }
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function showError(msg) {
            console.error('[Groq Chat Error]', msg);
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = msg;
            errorBox.style.display = 'block';
            setTimeout(() => { errorBox.style.display = 'none'; }, 10000);
        }

        const ROBOT_ICON = `<svg viewBox="0 0 24 24"><path d="M12,2A2,2 0 0,1 14,4C14,4.74 13.59,5.39 13,5.73V7H14A3,3 0 0,1 17,10V11H18A2,2 0 0,1 20,13V17A2,2 0 0,1 18,19H17V20A2,2 0 0,1 15,22H9A2,2 0 0,1 7,20V19H6A2,2 0 0,1 4,17V13A2,2 0 0,1 6,11H7V10A3,3 0 0,1 10,7H11V5.73C10.41,5.39 10,4.74 10,4A2,2 0 0,1 12,2M7.5,13A1.5,1.5 0 0,0 6,14.5A1.5,1.5 0 0,0 7.5,16A1.5,1.5 0 0,0 9,14.5A1.5,1.5 0 0,0 7.5,13M16.5,13A1.5,1.5 0 0,0 15,14.5A1.5,1.5 0 0,0 16.5,16A1.5,1.5 0 0,0 18,14.5A1.5,1.5 0 0,0 16.5,13M12,14L10.75,17H13.25L12,14Z"/></svg>`;

        function addMessage(role, content) {
            messages.push({ role, content });
            const animate = role === 'assistant';
            renderMessage(role, content, animate);
            saveChat();
        }

        function renderMessage(role, content, animate = false) {
            const container = document.getElementById('chatContainer');
            const welcome = document.getElementById('welcome');
            if (welcome) welcome.style.display = 'none';
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            let formattedContent = content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            formattedContent = formattedContent
                .replace(/&lt;b&gt;/g, '<b>')
                .replace(/&lt;\/b&gt;/g, '</b>')
                .replace(/&lt;span class="ai-highlight"&gt;/g, '<span class="ai-highlight">')
                .replace(/&lt;\/span&gt;/g, '</span>')
                .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')
                .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
            
            if (role === 'assistant') {
                const innerHTML = `
                    <div class="bubble fade-bottom">
                        <div class="avatar">${ROBOT_ICON}</div>
                        <div class="message-content typing-text"></div>
                    </div>
                `;
                messageDiv.innerHTML = innerHTML;
                container.appendChild(messageDiv);

                const target = messageDiv.querySelector('.typing-text');
                if (animate) {
                    typeWriter(target, formattedContent);
                } else {
                    target.innerHTML = formattedContent;
                }
            } else {
                messageDiv.innerHTML = `
                    <div class="bubble">
                        <div class="message-content">${formattedContent}</div>
                    </div>
                `;
                container.appendChild(messageDiv);
            }
            
            container.scrollTop = container.scrollHeight;
        }

        function typeWriter(element, html, speed = 10) {
            let i = 0;
            let currentHTML = "";
            const timer = setInterval(() => {
                if (i < html.length) {
                    if (html[i] === '<') {
                        const end = html.indexOf('>', i);
                        currentHTML += html.substring(i, end + 1);
                        i = end + 1;
                    } else {
                        currentHTML += html[i];
                        i++;
                    }
                    element.innerHTML = currentHTML;
                    document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
                } else {
                    clearInterval(timer);
                    element.parentElement.classList.remove('fade-bottom');
                }
            }, speed);
        }

        async function sendMessage(overrideContent = null) {
            if (!checkApiKey()) return;
            
            const input = document.getElementById('messageInput');
            const model = "llama-3.1-8b-instant";
            const content = overrideContent || input.value.trim();
            
            if (!content || isTyping) return;

            if (isWebCreating && messages.length === 0) {
                webCredits--;
                localStorage.setItem('lumina_web_credits', webCredits);
                checkCreditReset();
            }

            addMessage('user', content);
            
            // Crear copia de mensajes para la API con el system prompt
            let systemPrompt = "Responde de forma resumida. Usa negritas para subtítulos. Agrega UN emoji UNICAMENTE al inicio de subtítulos en negrita (ej: 💡 **Título**). No uses emojis en ninguna otra parte del texto.";

            if (isHumanizing) {
                systemPrompt = "Actúa como un humanizador de texto profesional. Analiza el texto proporcionado y reescríbelo para que suene completamente natural, humano y evite patrones típicos de IA. Mantén el significado original.";
            }

            const apiMessages = [
                { role: "system", content: systemPrompt },
                ...messages.slice(-10)
            ];

            // Limpiar input si no es un comando de herramienta
            if (!overrideContent) {
                input.value = '';
                input.style.height = 'auto';
            }
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('sendBtn').classList.remove('active');

            // Mostrar typing
            isTyping = true;
            document.getElementById('typingIndicator').classList.add('active');
            
            console.log('[Request]', { model, messages_count: messages.length });

            try {
                if (isWebCreating) {
                    await handleWebCreation(content, apiMessages);
                    return;
                }

                const response = await fetch(`${BASE_URL}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GROQ_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: model,
                        messages: apiMessages,
                        temperature: 0.7,
                        max_tokens: 4096
                    })
                });

                console.log('[Response Status]', response.status, response.statusText);

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    console.error('[API Error]', errorData);
                    
                    let errorMsg = `Error ${response.status}: ${response.statusText}`;
                    
                    if (response.status === 401) {
                        errorMsg = 'Error 401: API Key inválida o expirada.\n\nVerifica tu clave en https://console.groq.com/keys';
                    } else if (response.status === 404) {
                        errorMsg = `Error 404: Modelo "${model}" no encontrado.\n\nEste modelo puede haber sido eliminado. Prueba con "Llama 3.3 70B" que es el más estable.`;
                    } else if (response.status === 429) {
                        errorMsg = 'Error 429: Límite de peticiones excedido.\n\nEspera un momento o verifica tus créditos en Groq.';
                    } else if (errorData.error?.message) {
                        errorMsg = `Error: ${errorData.error.message}`;
                    }
                    
                    throw new Error(errorMsg);
                }

                const data = await response.json();
                const assistantMessage = data.choices[0].message.content;
                
                document.getElementById('typingIndicator').classList.remove('active');

                if (isHumanizing && messages.length <= 2) {
                    // Si es humanizador, el primer mensaje (o el que tiene el detector)
                    // debe mostrar el recuadro de porcentaje
                    renderHumanizerResult(assistantMessage);
                } else {
                    addMessage('assistant', assistantMessage);
                }

            } catch (error) {
                document.getElementById('typingIndicator').classList.remove('active');
                showError(error.message);
                console.error('[Catch Error]', error);
            } finally {
                isTyping = false;
            }
        }

        async function handleWebCreation(prompt, apiMessages) {
            const container = document.getElementById('chatContainer');
            document.getElementById('typingIndicator').classList.remove('active');

            // 1. Analizando (7s)
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = `
                <div class="loading-container">
                    <div class="spinner"></div>
                    <div class="loading-text">Analizando...</div>
                </div>
            `;
            container.appendChild(loadingDiv);
            container.scrollTop = container.scrollHeight;

            await new Promise(r => setTimeout(r, 7000));
            loadingDiv.querySelector('.loading-text').textContent = 'Iniciando...';

            // 2. Iniciando (4s)
            await new Promise(r => setTimeout(r, 4000));

            // 3. Petición real a la API
            try {
                const response = await fetch(`${BASE_URL}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${GROQ_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{ role: "system", content: "Crea el código HTML/CSS completo. Responde SOLO con el código, sin texto adicional." }, ...apiMessages.slice(1)],
                        temperature: 0.7,
                        max_tokens: 4096
                    })
                });

                const data = await response.json();
                const code = data.choices[0].message.content.replace(/```html|```css|```/g, '').trim();

                loadingDiv.remove();

                // 4. Mostrar Canvas con escritura en tiempo real
                renderCodeCanvas(code);
                messages.push({ role: 'assistant', content: code });
                saveChat();

            } catch (error) {
                loadingDiv.remove();
                showError(error.message);
            } finally {
                isTyping = false;
            }
        }

        function highlightHTML(code) {
            return code
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/(&lt;[a-z0-9]+)/gi, '<span style="color: #569cd6">$1</span>')
                .replace(/(&lt;\/[a-z0-9]+&gt;)/gi, '<span style="color: #569cd6">$1</span>')
                .replace(/([a-z-]+)=/gi, '<span style="color: #9cdcfe">$1</span>=')
                .replace(/"([^"]*)"/g, '<span style="color: #ce9178">"$1"</span>');
        }

        function renderCodeCanvas(code) {
            const container = document.getElementById('chatContainer');
            const canvasDiv = document.createElement('div');
            canvasDiv.className = 'message assistant';
            canvasDiv.innerHTML = `
                <div class="canvas-container">
                    <div class="canvas-header">
                        <span>index.html</span>
                        <button class="copy-btn" onclick="copyToClipboard(this)">Copiar</button>
                    </div>
                    <div class="canvas-content typing-text"></div>
                </div>
            `;
            container.appendChild(canvasDiv);
            const target = canvasDiv.querySelector('.canvas-content');

            const highlighted = highlightHTML(code);
            typeWriter(target, highlighted, 5);
        }

        function renderHumanizerResult(content) {
            const container = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';

            // Extraer porcentaje si existe en el estado anterior (simulado para la tarea)
            const percentage = Math.floor(Math.random() * 30) + 5; // Simulación de mejora

            messageDiv.innerHTML = `
                <div class="bubble">
                    <div class="detector-box">Detección de IA: ${percentage}% (Mejorado)</div>
                    <div class="canvas-container" style="background: var(--bg-glass);">
                        <div class="canvas-header">
                            <span>Texto Humanizado</span>
                            <button class="copy-btn" onclick="copyToClipboard(this)">Copiar</button>
                        </div>
                        <div class="canvas-content typing-text" style="color: var(--text-primary);"></div>
                    </div>
                </div>
            `;
            container.appendChild(messageDiv);
            typeWriter(messageDiv.querySelector('.typing-text'), content);
            messages.push({ role: 'assistant', content });
            saveChat();
        }

        function copyToClipboard(btn) {
            const content = btn.parentElement.nextElementSibling.textContent;
            navigator.clipboard.writeText(content);
            btn.textContent = '¡Copiado!';
            setTimeout(() => btn.textContent = 'Copiar', 2000);
        }

        // Borrar la función duplicada de abajo si existe
    </script>
